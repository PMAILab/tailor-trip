# Render blueprint for TailorTrip's API only — the frontend is a separate
# Netlify site (see netlify.toml). This service never runs `vite build`, so
# server/index.ts's dist/index.html check never finds a build and the
# service stays API-only (no static file serving).
#
# Notes
# - Render injects PORT; the server reads process.env.PORT.
# - The browser never talks to Supabase directly (auth is fully server-side).
#   Fill every "sync: false" var in the dashboard.
# - Set FRONTEND_ORIGIN to the Netlify site's https://<domain> — required for
#   CORS (so the browser accepts the cross-origin session cookie) and for
#   post-login redirects to land back on the frontend instead of here.
# - Add this service's own https://<domain>/api/auth/google/callback to
#   Supabase Dashboard → Auth → URL Configuration → Redirect URLs once the
#   domain is known, and set APP_ORIGIN to that same https://<domain> below —
#   without it the server falls back to inferring the origin from the
#   request, which works too but explicit is more reliable.
services:
  - type: web
    name: tailortrip-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
