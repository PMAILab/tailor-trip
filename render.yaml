# Render blueprint for TailorTrip: one web service that builds the SPA and
# serves it together with the Express BFF under /api.
#
# Notes
# - Build runs with devDependencies available (Vite, tsx), so NODE_ENV is left
#   unset here; the start script sets it to production at runtime.
# - Render injects PORT; the server reads process.env.PORT.
# - The browser never talks to Supabase directly (auth is fully server-side),
#   so only VITE_TRAVELPAYOUTS_MARKER needs to be baked in at build time.
#   Fill every "sync: false" var in the dashboard.
# - Add this service's own https://<domain>/api/auth/google/callback to
#   Supabase Dashboard → Auth → URL Configuration → Redirect URLs once the
#   domain is known, and set APP_ORIGIN to that same https://<domain> below —
#   without it the server falls back to inferring the origin from the
#   request, which is fine on Render's single-origin setup (no dev proxy
#   involved) but explicit is more reliable.
services:
  - type: web
    name: tailortrip
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_ORIGIN
        sync: false
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: VITE_TRAVELPAYOUTS_MARKER
        sync: false
